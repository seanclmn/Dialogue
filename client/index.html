<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="src/assets/nana.png" />
  <link rel="preload" href="/fonts/cedarville-cursive-latin.woff2" as="font" type="font/woff2" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dialogue</title>
  <link rel="preconnect" href="https://dialogue-api-1043694315311.us-east4.run.app" crossorigin>
  <style>
    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      background: #121212;
    }
    @media (prefers-color-scheme: light) {
      #root:empty { background: #ffffff; }
      #root:empty::after { border-color: #e8e8e8d0; border-top-color: #3b82f6; }
    }
    #root:empty::after {
      content: "";
      width: 36px;
      height: 36px;
      border: 3px solid #333333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: _spin 0.7s linear infinite;
    }
    @keyframes _spin { to { transform: rotate(360deg); } }

    html, body, #root { height: 100%; width: 100%; margin: 0; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
